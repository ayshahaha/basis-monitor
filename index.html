<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Basis Monitor</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #0d1117;
  color: #e6edf3;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  padding: 16px;
  min-height: 100vh;
}
header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  margin-bottom: 12px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
}
h1 {
  font-size: 18px;
  font-weight: 700;
  white-space: nowrap;
}
h1 .logo { color: #f0b90b; }
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex: 1;
  flex-wrap: wrap;
}
#search {
  background: #0d1117;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 7px 12px;
  border-radius: 6px;
  width: 180px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
#search:focus { border-color: #58a6ff; }
#search::placeholder { color: #484f58; }
.stats {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
  color: #8b949e;
  margin-left: auto;
}
.stats .label { color: #6e7681; }
.stats .val { color: #e6edf3; font-weight: 600; }
#pauseBtn {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 5px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
  white-space: nowrap;
}
#pauseBtn:hover { background: #30363d; }
#pauseBtn.paused { border-color: #f0b90b; color: #f0b90b; }
#pauseBtn .icon { margin-right: 4px; }
#statusDot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-right: 4px;
}
#statusDot.live { background: #3fb950; }
#statusDot.stale { background: #f0b90b; }
#statusDot.error { background: #f85149; }
#statusDot.loading { background: #8b949e; animation: pulse 0.8s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.table-wrap {
  overflow-x: auto;
  border: 1px solid #30363d;
  border-radius: 8px;
  background: #161b22;
}
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 600px;
}
thead {
  position: sticky;
  top: 0;
  z-index: 2;
}
th {
  background: #1c2128;
  padding: 10px 14px;
  text-align: right;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #8b949e;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  border-bottom: 1px solid #30363d;
  position: relative;
}
th:first-child { text-align: left; padding-left: 18px; }
th:last-child { padding-right: 18px; }
th:hover { color: #c9d1d9; }
th .sort-arrow { margin-left: 3px; opacity: 0.3; font-size: 10px; }
th.sorted .sort-arrow { opacity: 1; color: #f0b90b; }
td {
  padding: 8px 14px;
  text-align: right;
  border-top: 1px solid #21262d;
  font-size: 13px;
  white-space: nowrap;
  transition: background 0.15s;
}
td:first-child { text-align: left; padding-left: 18px; }
td:last-child { padding-right: 18px; }
tbody tr:hover td { background: rgba(88, 166, 255, 0.04); }
.sym {
  font-weight: 600;
  color: #58a6ff;
  cursor: pointer;
}
.sym:hover { text-decoration: underline; color: #79c0ff; }
.price { font-family: 'SF Mono', SFMono-Regular, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace; }
.basis { font-weight: 700; }
.basis.positive { color: #3fb950; }
.basis.negative { color: #f85149; }
.fund { font-family: 'SF Mono', SFMono-Regular, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace; }
.fund.positive { color: #3fb950; }
.fund.negative { color: #f85149; }
.countdown { font-family: 'SF Mono', SFMono-Regular, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace; font-size: 12px; color: #8b949e; }
.empty-msg, .error-msg { text-align: center; padding: 48px 20px; color: #8b949e; font-size: 14px; }
.error-msg { color: #f85149; }
.retry-btn {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 12px;
  font-size: 13px;
}
.retry-btn:hover { background: #30363d; }
footer {
  text-align: center;
  padding: 20px;
  color: #484f58;
  font-size: 11px;
}
@media (max-width: 640px) {
  body { padding: 8px; }
  header { padding: 10px 14px; gap: 8px; flex-wrap: wrap; }
  h1 { font-size: 15px; width: 100%; }
  .controls { width: 100%; }
  #search { width: 100%; }
  th, td { padding: 4px 6px; font-size: 11px; }
  th:first-child, td:first-child { padding-left: 8px; }
  th:last-child, td:last-child { padding-right: 8px; }
  .stats { gap: 6px; font-size: 10px; margin-left: 0; width: 100%; justify-content: space-between; }
  .tabs { gap: 2px; }
  .tab { padding: 6px 10px; font-size: 11px; white-space: nowrap; }
  .table-wrap { margin: 0 -8px; border-radius: 0; border-left: none; border-right: none; }
  table { min-width: 500px; }
  .summary-bar { flex-wrap: wrap; gap: 6px; padding: 8px 12px; font-size: 11px; }
  .summary-bar .bar-wrap { min-width: 40px; max-width: 100px; }
  .sim-settings { gap: 6px; padding: 8px 12px; }
  .sim-settings input { width: 50px; font-size: 11px; }
  .sim-stats { gap: 6px; font-size: 10px; }
  #activePositions, #closedPositions, #liveHistory { overflow-x: auto; }
  .pos-table { min-width: 400px; font-size: 11px; }
  .pos-table th, .pos-table td { padding: 6px 8px; }
  .howto-section { padding: 10px 12px; }
  .howto-table { font-size: 11px; }
  .howto-section li { font-size: 12px; }
}
@media (max-width: 480px) {
  th:nth-child(2), td:nth-child(2),
  th:nth-child(3), td:nth-child(3) { display: none; }
  th, td { padding: 3px 4px; font-size: 10px; }
  th:first-child, td:first-child { padding-left: 6px; }
  th:last-child, td:last-child { padding-right: 6px; }
  table { min-width: 320px; }
  h1 { font-size: 13px; }
  .tab { padding: 5px 8px; font-size: 10px; }
  .controls { gap: 6px; }
  #pauseBtn { font-size: 10px; padding: 4px 8px; }
}
.summary-bar {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 10px 20px;
  margin-bottom: 12px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
  font-size: 13px;
}
.summary-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.summary-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.summary-item .dot.pos { background: #3fb950; }
.summary-item .dot.neg { background: #f85149; }
.summary-item .num { font-weight: 700; }
.summary-item .num.pos { color: #3fb950; }
.summary-item .num.neg { color: #f85149; }
.summary-bar .bar-wrap {
  flex: 1;
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  overflow: hidden;
  min-width: 60px;
  max-width: 200px;
}
.summary-bar .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s ease;
}
.summary-bar .bar-fill.pos { background: #3fb950; }
.summary-bar .bar-fill.neg { background: #f85149; }
.summary-bar .sep { color: #30363d; }
.summary-bar .total { color: #8b949e; font-size: 12px; margin-left: auto; }
@media (max-width: 640px) {
  .summary-bar { flex-wrap: wrap; gap: 8px; padding: 8px 14px; font-size: 12px; }
  .summary-bar .bar-wrap { min-width: 40px; max-width: 100px; }
}

/* ====== Tabs ====== */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
.tab {
  background: #161b22;
  border: 1px solid #30363d;
  border-bottom: none;
  color: #8b949e;
  padding: 8px 20px;
  border-radius: 8px 8px 0 0;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s;
}
.tab:hover { color: #e6edf3; background: #1c2128; }
.tab.active {
  color: #f0b90b;
  background: #0d1117;
  border-color: #30363d;
}
.tab-content { display: block; }
.tab-content.hidden { display: none; }



/* ====== Live Trade ====== */
.live-warn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  margin-bottom: 12px;
  background: #2d1f00;
  border: 1px solid #f0b90b;
  border-radius: 8px;
  font-size: 12px;
  color: #f0b90b;
}
.live-warn .icon { font-size: 16px; flex-shrink: 0; }
.live-section {
  padding: 12px 16px;
  margin-bottom: 12px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px;
}
.live-section-title {
  font-size: 12px;
  font-weight: 600;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid #21262d;
}
.api-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.api-row label { font-size: 12px; color: #8b949e; width: 80px; flex-shrink: 0; }
.api-row input {
  flex: 1;
  min-width: 120px;
  background: #0d1117;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  font-family: 'SF Mono', Consolas, monospace;
}
.api-row input:focus { border-color: #58a6ff; }
.api-toggle {
  background: none;
  border: none;
  color: #484f58;
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
}
.api-toggle:hover { color: #e6edf3; }
.api-actions { display: flex; gap: 6px; }
.api-btn {
  background: #21262d;
  border: 1px solid #30363d;
  color: #e6edf3;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.15s;
}
.api-btn:hover { background: #30363d; }
.api-btn.primary { border-color: #58a6ff; color: #58a6ff; }
.api-btn.primary:hover { background: rgba(88,166,255,0.1); }
.api-btn.danger { border-color: #f85149; color: #f85149; }
.api-btn.danger:hover { background: rgba(248,81,73,0.1); }
.api-status {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 12px;
  color: #8b949e;
  margin-top: 8px;
}
.api-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.api-status .dot.green { background: #3fb950; }
.api-status .dot.red { background: #f85149; }
.api-status .dot.yellow { background: #f0b90b; }
.bal-row {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  font-size: 13px;
}
.bal-item { display: flex; align-items: center; gap: 6px; }
.bal-item .label { color: #8b949e; }
.bal-item .val { color: #e6edf3; font-weight: 600; }
.bal-item .val.pos { color: #3fb950; }
.bal-item .val.neg { color: #f85149; }
.session-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.session-item { font-size: 12px; }
.session-item .label { color: #8b949e; display: block; margin-bottom: 2px; }
.session-item .val { font-size: 14px; font-weight: 600; }
.session-item .val.pos { color: #3fb950; }
.session-item .val.neg { color: #f85149; }
.daily-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 12px;
  color: #8b949e;
}
.daily-bar .bar-wrap {
  flex: 1;
  height: 6px;
  background: #21262d;
  border-radius: 3px;
  overflow: hidden;
  max-width: 200px;
}
.daily-bar .bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.daily-bar .bar-fill.profit { background: #3fb950; }
.daily-bar .bar-fill.loss { background: #f85149; }
.panic-btn {
  display: block;
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  background: #2d0f0f;
  border: 2px solid #f85149;
  color: #f85149;
  font-size: 14px;
  font-weight: 700;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.panic-btn:hover { background: #f85149; color: #0d1117; }
.panic-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.log-list { max-height: 200px; overflow-y: auto; }
.log-entry {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  font-size: 12px;
  font-family: 'SF Mono', Consolas, monospace;
  border-bottom: 1px solid #1c2128;
}
.log-entry:last-child { border-bottom: none; }
.log-entry .time { color: #484f58; width: 70px; flex-shrink: 0; }
.log-entry .sym { color: #58a6ff; width: 70px; flex-shrink: 0; font-weight: 600; }
.log-entry .msg { flex: 1; color: #e6edf3; }
.log-entry .status { width: 60px; text-align: right; flex-shrink: 0; }
.log-entry .status.ok { color: #3fb950; }
.log-entry .status.fail { color: #f85149; }
.log-entry .status.info { color: #8b949e; }
@media (max-width: 640px) {
  .api-row { flex-direction: column; align-items: stretch; }
  .api-row label { width: auto; }
  .api-actions { justify-content: center; }
  .session-grid { grid-template-columns: repeat(2, 1fr); }
  .bal-row { gap: 12px; }
}
/* ====== Favorites ====== */
.star { cursor: pointer; font-size: 14px; color: #484f58; margin-right: 4px; user-select: none; transition: color 0.15s; }
.star:hover { color: #f0b90b; }
.star.active { color: #f0b90b; }
/* ====== 24h Change ====== */
.chg { font-family: 'SF Mono', Consolas, monospace; font-weight: 600; }
.chg.pos { color: #3fb950; }
.chg.neg { color: #f85149; }
/* ====== Volume ====== */
.vol { font-family: 'SF Mono', Consolas, monospace; font-size: 11px; color: #8b949e; }
/* ====== Sparkline ====== */
.spark-cell { padding: 4px 6px !important; width: 90px; }
.spark-cell canvas { display: block; width: 80px; height: 20px; }
/* ====== Interval Select ====== */
#intervalSelect {
  background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
  padding: 5px 8px; border-radius: 6px; font-size: 12px; outline: none;
  cursor: pointer;
}
#intervalSelect:focus { border-color: #58a6ff; }
/* ====== Filter ====== */
.filter-btn {
  background: #21262d; border: 1px solid #30363d; color: #e6edf3;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover { background: #30363d; }
.filter-btn.active { border-color: #58a6ff; color: #58a6ff; }
.filter-tags {
  display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
  width: 100%; min-height: 0; padding: 2px 0;
}
.filter-tag {
  display: inline-flex; align-items: center; gap: 3px;
  background: #1c2128; border: 1px solid #30363d; border-radius: 4px;
  padding: 2px 8px; font-size: 11px; color: #e6edf3; white-space: nowrap;
}
.filter-tag .remove {
  cursor: pointer; color: #484f58; font-size: 14px; line-height: 1; margin-left: 2px;
}
.filter-tag .remove:hover { color: #f85149; }
.tag-label { color: #8b949e; margin-right: 2px; }
.tag-val { color: #f0b90b; font-weight: 600; }
.filter-panel {
  display: none; width: 100%; padding: 10px 0 2px 0;
  border-top: 1px solid #21262d; margin-top: 4px;
}
.filter-panel.open { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
.filter-group { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8b949e; }
.filter-group label { white-space: nowrap; }
.filter-group input, .filter-group select {
  background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
  padding: 4px 6px; border-radius: 4px; font-size: 11px; outline: none; width: 56px;
}
.filter-group input:focus, .filter-group select:focus { border-color: #58a6ff; }
.filter-group select { width: auto; cursor: pointer; }
.filter-group input.wide { width: 80px; }
.filter-group input[type=checkbox] { width: auto; margin: 0; }
.filter-actions { display: flex; gap: 6px; margin-left: auto; }
.filter-actions button {
  background: #21262d; border: 1px solid #30363d; color: #e6edf3;
  padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 11px;
  transition: all 0.15s;
}
.filter-actions button:hover { background: #30363d; }
.filter-actions button.primary { border-color: #58a6ff; color: #58a6ff; }
.filter-actions button.primary:hover { background: rgba(88,166,255,0.1); }
.filter-actions button.danger { border-color: #f85149; color: #f85149; }
.filter-actions button.danger:hover { background: rgba(248,81,73,0.1); }
.preset-row { display: flex; flex-wrap: wrap; gap: 4px; width: 100%; margin-bottom: 8px; }
.preset-btn {
  background: #0d1117; border: 1px solid #30363d; color: #8b949e;
  padding: 3px 10px; border-radius: 12px; cursor: pointer; font-size: 11px;
  transition: all 0.15s; white-space: nowrap;
}
.preset-btn:hover { border-color: #58a6ff; color: #e6edf3; }
.preset-btn.active { background: rgba(88,166,255,0.15); border-color: #58a6ff; color: #58a6ff; }
@media (max-width: 640px) {
  .filter-panel.open { flex-direction: column; align-items: stretch; }
  .filter-group { flex-wrap: wrap; }
  .filter-actions { margin-left: 0; }
  .filter-actions button { flex: 1; }
}
/* ====== Alert Button ====== */
.alert-btn {
  background: #21262d; border: 1px solid #30363d; color: #e6edf3;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
  transition: all 0.15s; white-space: nowrap; position: relative;
}
.alert-btn:hover { background: #30363d; }
.alert-btn.has-alerts { border-color: #f0b90b; color: #f0b90b; }
.alert-badge {
  position: absolute; top: -4px; right: -4px; background: #f85149;
  color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px;
  border-radius: 8px; line-height: 1;
}
/* ====== Alert Modal ====== */
.alert-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 100; align-items: center; justify-content: center;
}
.alert-overlay.open { display: flex; }
.alert-modal {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  width: 90%; max-width: 460px; max-height: 80vh; overflow-y: auto;
  padding: 20px; position: relative;
}
.alert-modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: #e6edf3; }
.alert-modal-close {
  position: absolute; top: 14px; right: 16px; background: none; border: none;
  color: #8b949e; font-size: 20px; cursor: pointer;
}
.alert-modal-close:hover { color: #e6edf3; }
.alert-form { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #21262d; }
.alert-form select, .alert-form input {
  background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
  padding: 6px 10px; border-radius: 6px; font-size: 13px; outline: none;
}
.alert-form select { width: 110px; }
.alert-form input { width: 80px; }
.alert-form select:focus, .alert-form input:focus { border-color: #58a6ff; }
.alert-form .add-btn {
  background: #21262d; border: 1px solid #58a6ff; color: #58a6ff;
  padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
}
.alert-form .add-btn:hover { background: rgba(88,166,255,0.1); }
.alert-list { list-style: none; padding: 0; margin: 0; }
.alert-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 6px; font-size: 13px;
  border-bottom: 1px solid #1c2128;
}
.alert-item:last-child { border-bottom: none; }
.alert-item .sym { color: #58a6ff; font-weight: 600; width: 80px; }
.alert-item .dir { color: #8b949e; width: 50px; }
.alert-item .thresh { color: #f0b90b; font-weight: 600; font-family: 'SF Mono', Consolas, monospace; }
.alert-item .status { cursor: pointer; font-size: 16px; margin-left: auto; }
.alert-item .del-btn {

}
</style>
</head>
<body>

<script>
// ====== Config ======
const SPOT_EXCH_INFO  = 'https://api.binance.com/api/v3/exchangeInfo';
const FUT_EXCH_INFO   = 'https://fapi.binance.com/fapi/v1/exchangeInfo';
const SPOT_TICKER     = 'https://api.binance.com/api/v3/ticker/price';
const FUT_TICKER      = 'https://fapi.binance.com/fapi/v1/ticker/price';
const PREMIUM_INDEX   = 'https://fapi.binance.com/fapi/v1/premiumIndex';
const SPOT_TICKER_24H = 'https://api.binance.com/api/v3/ticker/24hr';
const FUT_TICKER_24H  = 'https://fapi.binance.com/fapi/v1/ticker/24hr';
const DEFAULT_REFRESH = 3000;

// ====== State ======
let symbols = [];
let sortKey = 'change24h';
let sortDir = 'asc';
let searchTerm = '';
let paused = false;
let favorites = [];
let alerts = [];
let basisHistory = new Map();
let refreshTimer = null;
let refreshMs = DEFAULT_REFRESH;
let filters = { basisMin: null, basisMax: null, chgMin: null, chgMax: null, volMin: null, fundingDir: '', favOnly: false };
const PRESETS = {
  posBasis: { label: 'Pos Basis', filters: { basisMin: 0, chgMin: 1 } },
  basis1:   { label: 'Basis > 1%', filters: { basisMin: 1 } },
  basis2:   { label: 'Basis > 2%', filters: { basisMin: 2 } },
  negBasis: { label: 'Neg Basis', filters: { basisMax: 0 } },
  highVol:  { label: 'High Vol',  filters: { volMin: 10000000 } },
  posFund:  { label: 'Pos Fund',  filters: { fundingDir: 'pos' } },
  favOnly:  { label: 'Fav Only',  filters: { favOnly: true } }
};

// ====== DOM refs ======
const tbody = document.getElementById('tbody');
const searchInput = document.getElementById('search');
const pauseBtn = document.getElementById('pauseBtn');
const pairCount = document.getElementById('pairCount');
const updateTime = document.getElementById('updateTime');
const statusDot = document.getElementById('statusDot');
const thMap = new Map();
document.querySelectorAll('th[data-key]').forEach(el => {
  const key = el.dataset.key;
  thMap.set(key, el);
  el.addEventListener('click', () => onSort(key));
});

// ====== Helpers ======
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function setStatus(state) {
  statusDot.className = state;
  statusDot.title = state === 'live' ? 'Live' : state === 'stale' ? 'Stale data' : state === 'error' ? 'Error' : 'Loading...';
}

// ====== Init ======
function startRefresh(ms) {
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(tick, ms);
  refreshMs = ms;
}
function reloadRefresh() { startRefresh(refreshMs); }

async function init() {
  try {
    setStatus('loading');
    tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">กำลังโหลด...</td></tr>';

    // Load persisted state
    try {
      const f = localStorage.getItem('basisFav');
      if (f) favorites = JSON.parse(f);
      const a = localStorage.getItem('basisAlerts');
      if (a) alerts = JSON.parse(a);
      const r = localStorage.getItem('basisInterval');
      if (r) refreshMs = parseInt(r) || DEFAULT_REFRESH;
      const fl = localStorage.getItem('basisFilters');
      if (fl) { filters = JSON.parse(fl); } else { filters = { chgMin: 10, volMin: 10000000 }; }
    } catch(e) {}
    document.getElementById('intervalSelect').value = String(refreshMs);
    syncFilterUI();
    renderFilterTags();
    updatePresetHighlights();

    const [spotInfo, futInfo] = await Promise.all([
      fetchJSON(SPOT_EXCH_INFO),
      fetchJSON(FUT_EXCH_INFO)
    ]);

    const spotSet = new Set(
      spotInfo.symbols
        .filter(s => s.quoteAsset === 'USDT' && s.status === 'TRADING')
        .map(s => s.symbol)
    );

    const futSet = new Set(
      futInfo.symbols
        .filter(s => s.quoteAsset === 'USDT' && s.contractType === 'PERPETUAL' && s.status === 'TRADING')
        .map(s => s.symbol)
    );

    symbols = [...spotSet].filter(s => futSet.has(s)).sort();

    if (symbols.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="error-msg">ไม่พบคู่เทรดที่ตรงกัน</td></tr>';
      setStatus('error');
      return;
    }

    // Populate alert symbol selector
    const sel = document.getElementById('alertSymbol');
    for (const s of symbols) {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    }

    pairCount.textContent = symbols.length;
    await refresh();
    startRefresh(refreshMs);

  } catch (err) {
    console.error('Init error:', err);
    tbody.innerHTML = `    <tr><td colspan="9" class="error-msg">
      ❌ ไม่สามารถโหลดข้อมูลจาก Binance API<br>
      <small>${err.message}</small><br>
      <button class="retry-btn" onclick="location.reload()">ลองใหม่</button>
    </td></tr>`;
    setStatus('error');
  }
}

// ====== Refresh ======
let refreshing = false;

function tick() {
  if (!paused && !refreshing) refresh();
}

async function refresh() {
  refreshing = true;
  try {
    const [spotPrices, futPrices, premiumData, spot24h, fut24h] = await Promise.all([
      fetchJSON(SPOT_TICKER),
      fetchJSON(FUT_TICKER),
      fetchJSON(PREMIUM_INDEX),
      fetchJSON(SPOT_TICKER_24H),
      fetchJSON(FUT_TICKER_24H)
    ]);

    const spotMap = new Map();
    for (const item of spotPrices) spotMap.set(item.symbol, parseFloat(item.price));

    const futMap = new Map();
    for (const item of futPrices) futMap.set(item.symbol, parseFloat(item.price));

    const spot24hMap = new Map();
    for (const item of spot24h) {
      spot24hMap.set(item.symbol, {
        change: item.priceChangePercent != null ? parseFloat(item.priceChangePercent) : null,
        volume: item.quoteVolume != null ? parseFloat(item.quoteVolume) : null
      });
    }

    const fut24hMap = new Map();
    for (const item of fut24h) {
      fut24hMap.set(item.symbol, {
        change: item.priceChangePercent != null ? parseFloat(item.priceChangePercent) : null,
        volume: item.quoteVolume != null ? parseFloat(item.quoteVolume) : null
      });
    }

    const pmMap = new Map();
    for (const item of premiumData) {
      pmMap.set(item.symbol, {
        fundingRate: item.lastFundingRate != null ? parseFloat(item.lastFundingRate) : null,
        nextFundingTime: item.nextFundingTime != null ? item.nextFundingTime : null
      });
    }

    const dataMap = new Map();
    let hasData = false;

    for (const sym of symbols) {
      const sp = spotMap.get(sym);
      const fp = futMap.get(sym);
      if (sp == null || fp == null || isNaN(sp) || isNaN(fp) || sp === 0 || fp === 0) continue;
      const basis = (fp - sp) / sp;
      const pm = pmMap.get(sym);
      const s24 = spot24hMap.get(sym);
      const f24 = fut24hMap.get(sym);

      // Update basis history for sparkline
      const bp = basis * 100;
      if (!basisHistory.has(sym)) basisHistory.set(sym, []);
      const hist = basisHistory.get(sym);
      hist.push(bp);
      if (hist.length > 60) hist.shift();

      dataMap.set(sym, {
        spotPrice: sp,
        futuresPrice: fp,
        basis,
        absBasis: Math.abs(basis),
        change24h: s24 ? s24.change : null,
        volume24h: s24 ? s24.volume : null,
        changeFut24h: f24 ? f24.change : null,
        fundingRate: pm ? pm.fundingRate : null,
        nextFundingTime: pm ? pm.nextFundingTime : null
      });
      hasData = true;
    }

    if (hasData) {
      render(dataMap);
      setStatus('live');
      checkAlerts(dataMap);
    }

  } catch (err) {
    console.error('Refresh error:', err);
    setStatus('stale');
  } finally {
    refreshing = false;
  }
}

// ====== Render ======
function render(dataMap) {
  const term = searchTerm.toLowerCase();
  const rows = [];

  let pos = 0, neg = 0;
  let sumBasis = 0;

  for (const [sym, d] of dataMap) {
    if (d.basis >= 0) pos++; else neg++;
    sumBasis += d.basis;
    if (term && !sym.toLowerCase().includes(term)) continue;

    const bp = d.basis * 100;
    const fr = d.fundingRate;

    const isFav = favorites.includes(sym);
    rows.push({
      sym,
      isFav,
      spotPrice: d.spotPrice,
      futuresPrice: d.futuresPrice,
      basis: bp,
      absBasis: d.absBasis,
      change24h: d.change24h,
      volume24h: d.volume24h,
      changeFut24h: d.changeFut24h,
      fundingRate: fr != null ? fr * 100 : null,
      nextFundingTime: d.nextFundingTime,
      basisHistory: basisHistory.get(sym) || []
    });
  }

  const total = pos + neg;
  const pctPos = total ? (pos / total * 100) : 50;

  document.getElementById('posCount').textContent = pos;
  document.getElementById('negCount').textContent = neg;
  document.getElementById('progressPos').style.width = pctPos + '%';
  document.getElementById('summaryTotal').textContent = total + ' pairs';

  const avg = total ? sumBasis / total : 0;
  document.getElementById('avgBasis').textContent = formatBasis(avg * 100);
  document.getElementById('avgBasis').className = avg >= 0 ? 'num pos' : 'num neg';

  // Sort: favorites first, then by selected key
  const key = sortKey === 'absBasis' ? 'absBasis' : sortKey;
  const dir = sortKey === 'symbol' ? (sortDir === 'asc' ? 1 : -1) : (sortDir === 'desc' ? 1 : -1);

  rows.sort((a, b) => {
    // Fav priority
    if (a.isFav !== b.isFav) return a.isFav ? -1 : 1;
    switch (key) {
      case 'symbol': return a.sym < b.sym ? -dir : a.sym > b.sym ? dir : 0;
      case 'nextFunding':
        return ((a.nextFundingTime ?? 0) - (b.nextFundingTime ?? 0)) * dir;
      default: return ((a[key] ?? 0) - (b[key] ?? 0)) * dir;
    }
  });

  let html = '';
  for (const r of rows) {
    const starCls = r.isFav ? 'star active' : 'star';
    const starChr = r.isFav ? '★' : '☆';
    const chgCls = r.change24h != null ? (r.change24h >= 0 ? 'pos' : 'neg') : '';
    const chgVal = r.change24h != null ? (r.change24h >= 0 ? '+' : '') + r.change24h.toFixed(2) + '%' : '—';
    const volVal = r.volume24h != null ? '$' + formatVolume(r.volume24h) : '—';
    const hist = r.basisHistory;

    html += '<tr>' +
      `<td><span class="${starCls}" data-sym="${r.sym}">${starChr}</span><a class="sym" href="https://www.binance.com/en/futures/${r.sym}" target="_blank">${r.sym}</a></td>` +
      `<td class="price">${formatPrice(r.spotPrice)}</td>` +
      `<td class="price">${formatPrice(r.futuresPrice)}</td>` +
      `<td class="basis ${r.basis >= 0 ? 'positive' : 'negative'}">${formatBasis(r.basis)}</td>` +
      `<td class="chg ${chgCls}">${chgVal}</td>` +
      `<td class="vol">${volVal}</td>` +
      `<td class="fund ${r.fundingRate != null ? (r.fundingRate >= 0 ? 'positive' : 'negative') : ''}">${r.fundingRate != null ? formatFundingRate(r.fundingRate) : '—'}</td>` +
      `<td class="countdown">${r.nextFundingTime ? formatCountdown(r.nextFundingTime) : '—'}</td>` +
      `<td class="spark-cell"><canvas data-hist="${r.sym}" width="80" height="20"></canvas></td>` +
      '</tr>';
  }

  tbody.innerHTML = html || '<tr><td colspan="9" class="empty-msg">ไม่พบเหรียญที่ค้นหา</td></tr>';

  // Bind star clicks
  tbody.querySelectorAll('.star').forEach(el => {
    el.addEventListener('click', () => toggleFav(el.dataset.sym));
  });

  // Draw sparklines
  tbody.querySelectorAll('canvas[data-hist]').forEach(canvas => {
    const sym = canvas.dataset.hist;
    const h = basisHistory.get(sym) || [];
    drawSparkline(canvas, h);
  });

  updateTime.textContent = new Date().toLocaleTimeString('th-TH', { hour12: false }) + ' น.';
}

// ====== Formatters ======
function formatPrice(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1000) return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (n >= 1) return n.toFixed(4);
  if (n >= 0.01) return n.toFixed(6);
  return n.toFixed(8);
}

function formatBasis(pct) {
  const abs = Math.abs(pct);
  let s;
  if (abs >= 10) s = pct.toFixed(2);
  else if (abs >= 1) s = pct.toFixed(3);
  else if (abs >= 0.1) s = pct.toFixed(4);
  else s = pct.toFixed(5);
  return (pct > 0 ? '+' : '') + s + '%';
}

function formatFundingRate(pct) {
  if (pct == null || isNaN(pct)) return '—';
  const abs = Math.abs(pct);
  let s;
  if (abs >= 10) s = pct.toFixed(2);
  else if (abs >= 1) s = pct.toFixed(3);
  else s = pct.toFixed(4);
  return (pct > 0 ? '+' : '') + s + '%';
}

function formatCountdown(ms) {
  const diff = ms - Date.now();
  if (diff <= 0) return '<span style="color:#f0b90b">Funding</span>';
  const totalSec = Math.floor(diff / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

// ====== Sort ======
function onSort(key) {
  if (sortKey === key) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortDir = (key === 'symbol') ? 'asc' : 'desc';
  }
  updateSortUI();
  render();
}

function updateSortUI() {
  thMap.forEach((el, k) => {
    el.classList.toggle('sorted', k === sortKey);
    const arrow = el.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = (k === sortKey) ? (sortDir === 'asc' ? '▲' : '▼') : '▼';
  });
}

// ====== Pause ======
pauseBtn.addEventListener('click', () => {
  paused = !paused;
  pauseBtn.classList.toggle('paused', paused);
  pauseBtn.innerHTML = paused ? '<span class="icon">▶</span>Resume' : '<span class="icon">⏸</span>Pause';
});

// ====== Store last data for search/sort re-render ======
let lastDataMap = new Map();

// Wrap render to use cached data when called without args
const _origRender = render;
render = function(dataMap) {
  if (arguments.length > 0) lastDataMap = dataMap;
  // Apply filters on a clone so original dataMap stays intact for Simulate
  const clone = new Map();
  for (const [k, v] of lastDataMap) clone.set(k, { ...v });
  applyFilters(clone);
  _origRender(clone);
};

// ====== Search ======
searchInput.addEventListener('input', () => {
  searchTerm = searchInput.value;
  render();
});

// ====== Keyboard ======
document.addEventListener('keydown', e => {
  if (e.key === '/' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    searchInput.focus();
  }
});

// ====== Tabs ======
document.querySelectorAll('.tab').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    document.getElementById('tab-' + el.dataset.tab).classList.remove('hidden');
  });
});

// ====== Favorites ======
function toggleFav(sym) {
  const idx = favorites.indexOf(sym);
  if (idx >= 0) favorites.splice(idx, 1);
  else favorites.push(sym);
  localStorage.setItem('basisFav', JSON.stringify(favorites));
  render();
}

// ====== Volume Formatter ======
function formatVolume(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toFixed(0);
}

// ====== Sparkline ======
function drawSparkline(canvas, data) {
  if (!canvas || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 2;

  ctx.strokeStyle = min >= 0 ? '#3fb950' : max <= 0 ? '#f85149' : '#f0b90b';
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  for (let i = 0; i < data.length; i++) {
    const x = pad + (i / (data.length - 1)) * (w - pad * 2);
    const y = h - pad - ((data[i] - min) / range) * (h - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ====== Alerts ======
function saveAlerts() {
  localStorage.setItem('basisAlerts', JSON.stringify(alerts));
  updateAlertBadge();
}

function updateAlertBadge() {
  const btn = document.getElementById('alertBtn');
  const enabled = alerts.filter(a => a.enabled).length;
  btn.classList.toggle('has-alerts', enabled > 0);
  const existing = btn.querySelector('.alert-badge');
  if (existing) existing.remove();
  if (enabled > 0) {
    const b = document.createElement('span');
    b.className = 'alert-badge'; b.textContent = enabled;
    btn.appendChild(b);
  }
}

function checkAlerts(dataMap) {
  for (const a of alerts) {
    if (!a.enabled) continue;
    const d = dataMap.get(a.symbol);
    if (!d) continue;
    const bp = d.basis * 100;
    let triggered = false;
    if (a.direction === 'above' && bp >= a.threshold) triggered = true;
    if (a.direction === 'below' && bp <= a.threshold) triggered = true;
    if (triggered) {
      a.enabled = false;
      saveAlerts();
      if (Notification.permission === 'granted') {
        try {
          new Notification('🔔 Basis Alert', {
            body: `${a.symbol} Basis ${bp >= 0 ? '+' : ''}${bp.toFixed(3)}% ${a.direction === 'above' ? '≥' : '≤'} ${a.threshold}%`,
            icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📊</text></svg>'
          });
        } catch(e) {}
      }
    }
  }
  renderAlertList();
}

function renderAlertList() {
  const el = document.getElementById('alertList');
  if (alerts.length === 0) {
    el.innerHTML = '<li class="alert-empty">No alerts set</li>';
    return;
  }
  let html = '';
  for (let i = 0; i < alerts.length; i++) {
    const a = alerts[i];
    html += `<li class="alert-item">
      <span class="sym">${a.symbol}</span>
      <span class="dir">${a.direction === 'above' ? '≥' : '≤'}</span>
      <span class="thresh">${a.threshold}%</span>
      <span class="status" data-idx="${i}">${a.enabled ? '🔔' : '🔕'}</span>
      <button class="del-btn" data-idx="${i}">&times;</button>
    </li>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.status').forEach(el2 => {
    el2.addEventListener('click', () => {
      const idx = parseInt(el2.dataset.idx);
      alerts[idx].enabled = !alerts[idx].enabled;
      saveAlerts(); renderAlertList();
    });
  });
  el.querySelectorAll('.del-btn').forEach(el2 => {
    el2.addEventListener('click', () => {
      alerts.splice(parseInt(el2.dataset.idx), 1);
      saveAlerts(); renderAlertList();
    });
  });
}

// ====== CSV Export ======
function exportCSV() {
  const rows = [];
  rows.push('Symbol,SpotPrice,FuturesPrice,Basis%,24hChange%,Volume24h,FundingRate,NextFunding');
  for (const [sym, d] of lastDataMap) {
    const bp = (d.basis * 100).toFixed(4);
    const chg = d.change24h != null ? d.change24h.toFixed(2) : '';
    const vol = d.volume24h != null ? d.volume24h.toFixed(2) : '';
    const fr = d.fundingRate != null ? (d.fundingRate * 100).toFixed(4) : '';
    const nf = d.nextFundingTime ? new Date(d.nextFundingTime).toISOString() : '';
    rows.push(`"${sym}",${d.spotPrice},${d.futuresPrice},${bp},${chg},${vol},${fr},${nf}`);
  }
  const csv = rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'basis_data_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ====== Top / Bottom Mover ======
function scrollToMover(top) {
  const rows = tbody.querySelectorAll('tr');
  if (rows.length === 0) return;
  // Find valid data rows (skip empty/error)
  const dataRows = [];
  rows.forEach((tr, i) => {
    const td = tr.querySelector('td');
    if (td && td.classList.contains('empty-msg')) return;
    if (td && td.classList.contains('error-msg')) return;
    dataRows.push(tr);
  });
  if (dataRows.length === 0) return;
  const target = top ? dataRows[0] : dataRows[dataRows.length - 1];
  target.scrollIntoView({ behavior: 'smooth', block: 'center' });
  target.style.transition = 'background 0.5s';
  target.style.background = 'rgba(240,185,11,0.08)';
  setTimeout(() => { target.style.background = ''; }, 1500);
}

document.getElementById('csvBtn').addEventListener('click', exportCSV);

// Request notification permission
if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

// ====== Filter ======
function updatePresetHighlights() {
  document.querySelectorAll('.preset-btn').forEach(btn => {
    const id = btn.dataset.preset;
    const p = PRESETS[id];
    if (!p) { btn.classList.remove('active'); return; }
    const match = Object.keys(p.filters).every(k => filters[k] === p.filters[k])
      && Object.keys(filters).every(k => k in p.filters || filters[k] === null || filters[k] === '' || filters[k] === false);
    btn.classList.toggle('active', match);
  });
}
function applyPreset(id) {
  const p = PRESETS[id];
  if (!p) return;
  filters = { basisMin: null, basisMax: null, chgMin: null, chgMax: null, volMin: null, fundingDir: '', favOnly: false, ...p.filters };
  saveFilters();
  syncFilterUI();
  renderFilterTags();
  updatePresetHighlights();
  document.getElementById('filterPanel').classList.remove('open');
  document.getElementById('filterBtn').classList.remove('active');
  render();
}
function saveFilters() {
  localStorage.setItem('basisFilters', JSON.stringify(filters));
}

function applyFilters(dataMap) {
  for (const [sym, d] of [...dataMap]) {
    const bp = d.basis * 100;
    if (filters.favOnly && !favorites.includes(sym)) { dataMap.delete(sym); continue; }
    if (filters.basisMin != null && !isNaN(filters.basisMin) && bp < filters.basisMin) { dataMap.delete(sym); continue; }
    if (filters.basisMax != null && !isNaN(filters.basisMax) && bp > filters.basisMax) { dataMap.delete(sym); continue; }
    if (filters.chgMin != null && !isNaN(filters.chgMin) && (d.change24h == null || d.change24h < filters.chgMin)) { dataMap.delete(sym); continue; }
    if (filters.chgMax != null && !isNaN(filters.chgMax) && (d.change24h == null || d.change24h > filters.chgMax)) { dataMap.delete(sym); continue; }
    if (filters.volMin != null && !isNaN(filters.volMin) && (d.volume24h == null || d.volume24h < filters.volMin)) { dataMap.delete(sym); continue; }
    if (filters.fundingDir === 'pos' && (d.fundingRate == null || d.fundingRate <= 0)) { dataMap.delete(sym); continue; }
    if (filters.fundingDir === 'neg' && (d.fundingRate == null || d.fundingRate >= 0)) { dataMap.delete(sym); continue; }
  }
  return dataMap;
}

function renderFilterTags() {
  const el = document.getElementById('filterTags');
  const tags = [];
  const add = (label, val, key) => tags.push(`<span class="filter-tag"><span class="tag-label">${label}</span><span class="tag-val">${val}</span><span class="remove" data-key="${key}">×</span></span>`);
  if (filters.basisMin != null) add('Basis ≥', filters.basisMin + '%', 'basisMin');
  if (filters.basisMax != null) add('Basis ≤', filters.basisMax + '%', 'basisMax');
  if (filters.chgMin != null) add('Chg ≥', filters.chgMin + '%', 'chgMin');
  if (filters.chgMax != null) add('Chg ≤', filters.chgMax + '%', 'chgMax');
  if (filters.volMin != null) add('Vol ≥', '$' + formatVolume(filters.volMin), 'volMin');
  if (filters.fundingDir === 'pos') add('Funding', 'Pos', 'fundingDir');
  if (filters.fundingDir === 'neg') add('Funding', 'Neg', 'fundingDir');
  if (filters.favOnly) add('', '★ Fav only', 'favOnly');
  el.innerHTML = tags.join('');
  el.querySelectorAll('.remove').forEach(el2 => {
    el2.addEventListener('click', () => {
      const key = el2.dataset.key;
      if (key === 'basisMin') filters.basisMin = null;
      else if (key === 'basisMax') filters.basisMax = null;
      else if (key === 'chgMin') filters.chgMin = null;
      else if (key === 'chgMax') filters.chgMax = null;
      else if (key === 'volMin') filters.volMin = null;
      else if (key === 'fundingDir') filters.fundingDir = '';
      else if (key === 'favOnly') filters.favOnly = false;
      saveFilters();
      syncFilterUI();
      renderFilterTags();
      render();
    });
  });
}

function syncFilterUI() {
  document.getElementById('fBasisMin').value = filters.basisMin != null ? filters.basisMin : '';
  document.getElementById('fBasisMax').value = filters.basisMax != null ? filters.basisMax : '';
  document.getElementById('fChgMin').value = filters.chgMin != null ? filters.chgMin : '';
  document.getElementById('fChgMax').value = filters.chgMax != null ? filters.chgMax : '';
  document.getElementById('fVolMin').value = filters.volMin != null ? filters.volMin : '';
  document.getElementById('fFundingDir').value = filters.fundingDir || '';
  document.getElementById('fFavOnly').checked = filters.favOnly;
}

// Filter event bindings
document.getElementById('filterBtn').addEventListener('click', () => {
  document.getElementById('filterPanel').classList.toggle('open');
  document.getElementById('filterBtn').classList.toggle('active');
  syncFilterUI();
});
document.getElementById('filterApply').addEventListener('click', () => {
  const toNum = (id) => { const v = document.getElementById(id).value; return v === '' ? null : parseFloat(v); };
  filters.basisMin = toNum('fBasisMin');
  filters.basisMax = toNum('fBasisMax');
  filters.chgMin = toNum('fChgMin');
  filters.chgMax = toNum('fChgMax');
  filters.volMin = toNum('fVolMin');
  filters.fundingDir = document.getElementById('fFundingDir').value;
  filters.favOnly = document.getElementById('fFavOnly').checked;
  saveFilters();
  renderFilterTags();
  updatePresetHighlights();
  document.getElementById('filterPanel').classList.remove('open');
  document.getElementById('filterBtn').classList.remove('active');
  render();
});
document.getElementById('filterReset').addEventListener('click', () => {
  filters = { basisMin: null, basisMax: null, chgMin: null, chgMax: null, volMin: null, fundingDir: '', favOnly: false };
  saveFilters();
  syncFilterUI();
  renderFilterTags();
  updatePresetHighlights();
  document.getElementById('filterPanel').classList.remove('open');
  document.getElementById('filterBtn').classList.remove('active');
  render();
});
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});
